;PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storage
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_itsybitsy_m4]
platform = atmelsam
board = adafruit_itsybitsy_m4
framework = arduino
monitor_speed = 9600
; The Adafruit SAMD core bundles an I2S library that no longer compiles against
; the current Atmel CMSIS pack (the GCLK register layout changed). FastLED's
; dependency finder pulls it in even though the APA102 strands use clocked SPI,
; not I2S, so ignore it to keep the build clean.
lib_ignore = I2S
; The firmware drives the APA102 strands through FastLED. Adafruit DotStar is
; only used by the adafruit_strand_test example (not built here), and pulling it
; in drags in Adafruit BusIO -> Wire, so it is intentionally not a dependency.
lib_deps =
  FastLED
  Time
  Timezone
  TinyGPSPlus